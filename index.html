<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tnk - P. 268</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --chalk: #26332A;
    --chalk-2: #32432F;
    --paper: #FAF5EA;
    --paper-2: #F1E9D8;
    --tomato: #C6452C;
    --tomato-dark: #A3381F;
    --corn: #E3A93B;
    --sage: #6E8F5C;
    --wood: #3E2E22;
    --wood-light: #6B5644;
    --line: rgba(62,46,34,0.16);
    --shadow: 0 2px 10px rgba(38,51,42,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--wood);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex;min-height:100vh;flex-direction:column;}

  /* HEADER */
  header.topbar{
    background:var(--chalk);
    color:var(--paper);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:var(--shadow);
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .crate{
    width:34px;height:34px;border-radius:6px;
    background:linear-gradient(155deg,var(--tomato),var(--tomato-dark));
    display:flex;align-items:center;justify-content:center;
    font-family:'Oswald',sans-serif;font-weight:700;color:var(--paper);
    font-size:12px;letter-spacing:0.2px;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,0.15);
  }
  .brand h1{
    font-family:'Oswald',sans-serif;font-weight:700;
    font-size:19px;letter-spacing:0.4px;margin:0;text-transform:uppercase;
  }
  .brand span.sub{display:block;font-size:10.5px;color:var(--corn);font-weight:500;letter-spacing:1px;text-transform:uppercase;font-family:'Inter',sans-serif;}
  .today{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--paper);opacity:0.75;text-align:right;}

  /* NAV */
  nav.tabs{
    display:flex;gap:4px;background:var(--chalk-2);padding:6px 12px;
    overflow-x:auto;position:sticky;top:62px;z-index:19;
  }
  nav.tabs button{
    background:transparent;border:none;color:rgba(250,245,234,0.65);
    font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;
    letter-spacing:0.5px;text-transform:uppercase;
    padding:10px 14px;border-radius:8px 8px 0 0;cursor:pointer;
    display:flex;align-items:center;gap:7px;white-space:nowrap;
    transition:background .15s, color .15s;
  }
  nav.tabs button svg{width:15px;height:15px;flex-shrink:0;}
  nav.tabs button.active{background:var(--paper);color:var(--wood);}
  nav.tabs button:not(.active):hover{color:var(--paper);}

  main{flex:1;padding:20px 18px 90px;max-width:1100px;margin:0 auto;width:100%;}

  /* dashboard cards */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
  .stat-card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:12px;
    padding:16px;
  }
  .stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--wood-light);font-weight:600;}
  .stat-card .value{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--chalk);margin-top:6px;}
  .stat-card.accent .value{color:var(--tomato);}

  h2.section-title{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;
    text-transform:uppercase;letter-spacing:0.6px;color:var(--wood-light);
    margin:26px 0 12px;display:flex;align-items:center;gap:8px;
  }
  h2.section-title:first-child{margin-top:0;}
  h2.section-title::after{content:'';flex:1;height:1px;background:var(--line);}

  /* header row for lists */
  .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
  .list-header h2{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;color:var(--chalk);
    text-transform:uppercase;letter-spacing:0.3px;margin:0;
  }
  .search-box{
    flex:1;min-width:160px;max-width:280px;
    display:flex;align-items:center;gap:8px;
    background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 12px;
  }
  .search-box input{border:none;outline:none;font-family:'Inter';font-size:13px;width:100%;background:transparent;color:var(--wood);}
  .date-filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .quick-date-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .date-filter-wrap{display:flex;align-items:center;gap:6px;}
  .date-range-sep{font-size:12px;color:var(--wood-light);}
  .date-filter-wrap input[type=date]{
    font-family:'Inter';font-size:12.5px;border:1px solid var(--line);border-radius:6px;
    padding:8px 9px;background:#fff;color:var(--wood);cursor:pointer;
  }
  .quick-date-btn{
    font-family:'Inter';font-size:12.5px;font-weight:600;border:1px solid var(--line);border-radius:6px;
    padding:8px 11px;background:#fff;color:var(--wood-light);cursor:pointer;white-space:nowrap;
  }
  .quick-date-btn:hover{background:var(--paper-2);}
  .quick-date-btn.active{background:var(--tomato);border-color:var(--tomato);color:var(--paper);}
  .search-box svg{width:14px;height:14px;color:var(--wood-light);flex-shrink:0;}

  button.btn{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:12.5px;
    letter-spacing:0.4px;text-transform:uppercase;
    border:none;border-radius:8px;padding:10px 16px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
    transition:transform .1s, box-shadow .1s;
  }
  button.btn:active{transform:scale(0.97);}
  button.btn.primary{background:var(--tomato);color:var(--paper);box-shadow:0 2px 0 var(--tomato-dark);}
  button.btn.primary:hover{background:var(--tomato-dark);}
  button.btn.ghost{background:transparent;color:var(--wood-light);border:1px solid var(--line);}
  button.btn.ghost:hover{background:var(--paper-2);}
  button.btn.small{padding:6px 10px;font-size:11px;}
  button.btn svg{width:14px;height:14px;}

  /* cards list (clients / orders) */
  .card-list{display:flex;flex-direction:column;gap:10px;}
  .item-card{
    background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    box-shadow:var(--shadow);
  }
  .item-card .info{flex:1;min-width:180px;}
  .item-card .info.clickable{cursor:pointer;border-radius:8px;margin:-4px;padding:4px;transition:background .12s;}
  .item-card .info.clickable:hover{background:var(--paper-2);}
  .item-card .info.clickable:hover .name{color:var(--tomato);}
  .item-card .info .name{font-weight:700;color:var(--chalk);font-size:15px;}
  .item-card .info .meta{font-size:12.5px;color:var(--wood-light);margin-top:3px;}
  .tag{
    display:inline-block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;
    padding:3px 8px;border-radius:20px;margin-right:6px;
  }
  .tag.rest{background:#EFE0D0;color:var(--wood);}
  .tag.merc{background:#DCE8D3;color:var(--sage);}
  .tag.feir{background:#F5DCC5;color:var(--tomato-dark);}
  .tag.outro{background:var(--paper-2);color:var(--wood-light);}
  .actions-row{display:flex;gap:6px;}
  .icon-btn{
    background:var(--paper-2);border:none;border-radius:7px;width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--wood-light);
  }
  .icon-btn:hover{background:var(--line);color:var(--wood);}
  .icon-btn svg{width:15px;height:15px;}
  .icon-btn.danger:hover{background:#F5D9D2;color:var(--tomato-dark);}

  /* product price-tag grid */
  .tag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px 14px;}
  .price-tag{
    position:relative;background:#FFFDF7;border:1px solid var(--line);
    border-radius:4px;padding:16px 12px 14px;
    box-shadow:var(--shadow);
    transform:rotate(var(--r,0deg));
  }
  .price-tag:nth-child(3n+1){--r:-0.6deg;}
  .price-tag:nth-child(3n+2){--r:0.5deg;}
  .price-tag:nth-child(3n){--r:-0.3deg;}
  .price-tag::before{
    content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:9px;height:9px;border-radius:50%;background:var(--paper);
    border:2px solid var(--line);
  }
  .price-tag .pname{font-family:'Oswald',sans-serif;font-weight:600;font-size:14.5px;color:var(--chalk);margin-top:10px;text-transform:uppercase;letter-spacing:0.2px;}
  .price-tag .punit{font-size:11px;color:var(--wood-light);margin-top:2px;}
  .price-tag .pprice{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:21px;color:var(--tomato);margin-top:8px;}
  .price-tag .pprice small{font-size:11px;font-weight:500;color:var(--wood-light);}
  .price-tag .pcusto{font-size:11px;color:var(--wood-light);margin-top:6px;}
  .price-tag .pmargem{font-size:11px;font-weight:600;margin-top:2px;}
  .price-tag .pmargem.pos{color:var(--sage);}
  .price-tag .pmargem.neg{color:var(--tomato-dark);}
  .price-tag .tag-actions{display:flex;gap:6px;margin-top:10px;}

  /* order card: checklist + status checks */
  select.status-select{
    font-family:'Inter';font-size:12px;border:1px solid var(--line);border-radius:6px;
    padding:5px 6px;background:#fff;color:var(--wood);
  }
  .order-card{flex-direction:column;align-items:stretch;gap:10px;}
  .order-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .order-card-top .name{font-weight:700;color:var(--chalk);font-size:15px;}
  .order-card-top .date-tag{font-weight:400;color:var(--wood-light);font-size:12px;}
  .order-items-checklist{display:flex;flex-direction:column;gap:2px;}
  .check-row{
    display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;
    font-size:13.5px;color:var(--wood);cursor:pointer;transition:background .12s;
  }
  .check-row:hover{background:var(--paper-2);}
  .check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--sage);flex-shrink:0;cursor:pointer;}
  .check-row.checked-row span{color:var(--wood-light);}
  .order-card-bottom{
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    border-top:1px dashed var(--line);padding-top:10px;
  }
  .order-total-tag{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--tomato);}
  .status-checks{display:flex;gap:8px;flex-wrap:wrap;}
  .check-pill{
    display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.3px;padding:6px 11px;border-radius:20px;
    background:var(--paper-2);color:var(--wood-light);cursor:pointer;transition:background .12s,color .12s;
  }
  .check-pill input[type=checkbox]{width:14px;height:14px;cursor:pointer;}
  .check-pill.on{background:#DDE9F0;color:#3A6E8A;}
  .pay-status-select{
    font-family:'Inter';font-size:12px;font-weight:600;border-radius:20px;
    padding:6px 10px;border:1px solid var(--line);cursor:pointer;outline:none;
    background:var(--paper-2);color:var(--wood-light);
  }
  .pay-status-select.pendente{background:#F7EBD2;color:#8A6416;border-color:transparent;}
  .pay-status-select.pago{background:#DCE8D3;color:var(--sage);border-color:transparent;}
  .forma-pag-select{
    font-family:'Inter';font-size:12px;font-weight:500;border-radius:20px;
    padding:6px 10px;border:1px solid var(--line);cursor:pointer;outline:none;
    background:#fff;color:var(--wood);
  }
  .checkbox-field{
    display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:500;
    color:var(--wood);border:1px solid var(--line);border-radius:8px;padding:10px 12px;
    background:#fff;cursor:pointer;
  }
  .checkbox-field input{width:16px;height:16px;accent-color:var(--tomato);cursor:pointer;}
  .item-separado-check{display:flex;align-items:center;justify-content:center;}
  .item-separado-check input{width:16px;height:16px;accent-color:var(--sage);cursor:pointer;}

  .printer-status-bar{margin-bottom:14px;}
  .printer-pill{
    display:flex;align-items:center;gap:7px;width:100%;text-align:left;
    background:var(--paper-2);border:1px dashed var(--line);border-radius:8px;
    padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--wood-light);
    cursor:pointer;font-family:'Inter';
  }
  .printer-pill svg{width:15px;height:15px;flex-shrink:0;}
  .printer-pill.on{background:#DCE8D3;border:1px solid transparent;color:var(--sage);}
  .printer-pill.warn{background:#F7EBD2;border:1px dashed transparent;color:#8A6416;cursor:default;}
  .printer-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .printer-row .printer-pill{width:auto;flex:1;min-width:180px;}

  .filter-banner{
    background:var(--paper-2);border:1px solid var(--line);border-radius:8px;
    padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--wood-light);
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  }
  .filter-banner strong{color:var(--chalk);}
  .empty-state{
    text-align:center;padding:50px 20px;color:var(--wood-light);
  }
  .empty-state .icon{width:44px;height:44px;margin:0 auto 14px;color:var(--line);}
  .empty-state p{margin:4px 0;font-size:13.5px;}
  .empty-state .big{font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;color:var(--wood);text-transform:uppercase;letter-spacing:0.3px;}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(38,51,42,0.55);
    display:none;align-items:flex-end;justify-content:center;z-index:100;
    backdrop-filter:blur(2px);
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--paper);width:100%;max-width:480px;
    border-radius:16px 16px 0 0;padding:20px 20px 24px;
    max-height:88vh;overflow-y:auto;
    animation:slideup .18s ease-out;
  }
  @media(min-width:640px){
    .overlay{align-items:center;}
    .modal{border-radius:16px;}
  }
  @keyframes slideup{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal h3{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;color:var(--chalk);
    text-transform:uppercase;letter-spacing:0.3px;margin:0 0 16px;
  }
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--wood-light);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 11px;
    font-family:'Inter';font-size:14px;color:var(--wood);background:#fff;outline:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--tomato);}
  .field textarea{resize:vertical;min-height:56px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .order-item-row{
    border:1px solid var(--line);border-radius:10px;padding:9px 10px;margin-bottom:8px;background:#FFFDF8;
  }
  .oi-top{display:flex;align-items:center;gap:8px;}
  .oi-top select{flex:1;min-width:0;}
  .order-item-row select, .order-item-row input{padding:8px 9px;font-size:13px;}
  .oi-bottom{display:flex;gap:8px;margin-top:8px;padding-left:34px;}
  .oi-field{flex:1;min-width:0;}
  .oi-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.3px;color:var(--wood-light);font-weight:600;margin-bottom:3px;}
  .oi-field input{width:100%;}
  .oi-field input.needs-review{border-color:var(--corn);background:#FDF6E3;}
  .product-select-btn{
    flex:1;min-width:0;text-align:left;font-family:'Inter';font-size:13px;color:var(--wood);
    background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 9px;cursor:pointer;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .product-select-btn.placeholder{color:var(--wood-light);}
  .product-dropdown-panel{
    position:fixed;z-index:500;background:#fff;border:1px solid var(--line);border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,0.18);overflow:hidden;display:flex;flex-direction:column;
  }
  .product-dropdown-search{
    border:none;border-bottom:1px solid var(--line);padding:10px 12px;font-family:'Inter';font-size:13.5px;
    outline:none;color:var(--wood);
  }
  .product-dropdown-list{max-height:220px;overflow-y:auto;}
  .product-dropdown-item{
    padding:9px 12px;font-size:13px;color:var(--wood);cursor:pointer;
  }
  .product-dropdown-item:hover{background:var(--paper-2);}
  .product-dropdown-item.selected{background:#DCE8D3;color:var(--sage);font-weight:600;}
  .product-dropdown-empty{padding:12px;font-size:12.5px;color:var(--wood-light);text-align:center;}
  .remove-item{background:none;border:none;color:var(--tomato);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .remove-item svg{width:16px;height:16px;}
  .order-total{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--paper-2);border-radius:8px;padding:10px 12px;margin:14px 0;
  }
  .order-total .lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;text-transform:uppercase;color:var(--wood-light);}
  .order-total .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--tomato);}

  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions button{flex:1;justify-content:center;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--chalk);color:var(--paper);padding:11px 20px;border-radius:16px;
    font-size:13px;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,0.25);
    opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;z-index:200;
    max-width:90vw;width:340px;text-align:center;line-height:1.4;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .loading-wrap{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--wood-light);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px;font-size:13px;gap:10px;}
  .spinner{width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--tomato);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  footer.reset-bar{
    text-align:center;padding:14px;font-size:11px;color:var(--wood-light);
  }
  .reset-actions{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
  .sync-status{
    display:none;text-align:center;font-size:11px;font-weight:600;color:var(--corn);
    background:#3A3320;border-radius:20px;padding:6px 12px;margin:0 auto 8px;max-width:320px;
  }
  .sync-cloud-status{
    text-align:center;font-size:10.5px;color:var(--sage);margin-bottom:6px;
  }
  .storage-mode-note{
    text-align:center;font-size:10.5px;color:var(--wood-light);opacity:0.75;margin-bottom:6px;
  }
  .reset-actions .dot{opacity:0.5;}
  .link-btn{background:none;border:none;color:var(--sage);text-decoration:underline;cursor:pointer;font-size:11px;font-family:'Inter';padding:0;}
  .link-btn.danger-link{color:var(--tomato-dark);}

  @media(max-width:640px){
    main{padding:16px 12px 90px;}
    .brand h1{font-size:16px;}
    .today{display:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="crate">268</div>
      <div>
        <h1>Tnk - P. 268</h1>
        <span class="sub">Gestão da banca</span>
      </div>
    </div>
    <div class="today" id="today-label"></div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="clientes" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </button>

const UNIDADES = ['kg','caixa','saca','dúzia','maço','unidade','bandeja'];

  {v:'dinheiro', label:'Dinheiro', icon:'💵'},

function sortByName(arr){
  return [...arr].sort((a,b)=>a.nome.localeCompare(b.nome, 'pt-BR', {sensitivity:'base'}));

// ---------- DROPDOWN CUSTOMIZADO DE PRODUTO (busca + auto-scroll ao passar o mouse) ----------
let dropdownScrollSpeed = 0;
let dropdownScrollRAF = null;
let dropdownOutsideHandler = null;
function stopDropdownAutoScroll(){
  if(dropdownScrollRAF){ cancelAnimationFrame(dropdownScrollRAF); dropdownScrollRAF = null; }
  dropdownScrollSpeed = 0;
}
function startDropdownAutoScroll(listEl){
  function step(){
    if(dropdownScrollSpeed !== 0){
      listEl.scrollTop += dropdownScrollSpeed;
    }
    dropdownScrollRAF = requestAnimationFrame(step);
  }
  dropdownScrollRAF = requestAnimationFrame(step);
}
function closeProductDropdown(){
  const existing = document.getElementById('product-dropdown-panel');
  if(existing) existing.remove();
  stopDropdownAutoScroll();
  if(dropdownOutsideHandler){
    document.removeEventListener('mousedown', dropdownOutsideHandler);
    dropdownOutsideHandler = null;
  }
}
function normalizeSearch(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function openProductDropdown(anchorEl, currentProdutoId, labelFn, onSelect){
  closeProductDropdown();
  const rect = anchorEl.getBoundingClientRect();
  const panel = document.createElement('div');
  panel.id = 'product-dropdown-panel';
  panel.className = 'product-dropdown-panel';
  const spaceBelow = window.innerHeight - rect.bottom;
  const openUp = spaceBelow < 260;
  panel.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - rect.width - 8)) + 'px';
  panel.style.width = rect.width + 'px';
  if(openUp){
    panel.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
  }else{
    panel.style.top = (rect.bottom + 4) + 'px';
  }
  panel.innerHTML = `
    <input type="text" class="product-dropdown-search" placeholder="Buscar produto...">
    <div class="product-dropdown-list"></div>
  `;
  document.body.appendChild(panel);

  const searchInput = panel.querySelector('.product-dropdown-search');
  const listEl = panel.querySelector('.product-dropdown-list');

  function renderList(filterText){
    const norm = normalizeSearch(filterText);
    const filtered = sortByName(products).filter(p=>normalizeSearch(p.nome).includes(norm));
    listEl.innerHTML = filtered.length ? filtered.map(p=>`
      <div class="product-dropdown-item ${p.id===currentProdutoId?'selected':''}" data-pid="${p.id}">${escapeHtml(labelFn(p))}</div>
    `).join('') : `<div class="product-dropdown-empty">Nenhum produto encontrado</div>`;
  }
  renderList('');

  searchInput.addEventListener('input', ()=> renderList(searchInput.value));
  listEl.addEventListener('mousedown', (e)=>{
    const item = e.target.closest('.product-dropdown-item');
    if(!item) return;
    e.preventDefault();
    onSelect(item.dataset.pid);
    closeProductDropdown();
  });
  listEl.addEventListener('mousemove', (e)=>{
    const bounds = listEl.getBoundingClientRect();
    const y = e.clientY - bounds.top;
    const edge = 34;
    if(y < edge) dropdownScrollSpeed = -((edge - y) / 4 + 1);
    else if(y > bounds.height - edge) dropdownScrollSpeed = (y - (bounds.height - edge)) / 4 + 1;
    else dropdownScrollSpeed = 0;
  });
  listEl.addEventListener('mouseleave', ()=>{ dropdownScrollSpeed = 0; });
  startDropdownAutoScroll(listEl);

  searchInput.focus();

  dropdownOutsideHandler = (e)=>{
    if(!panel.contains(e.target) && e.target !== anchorEl){
      closeProductDropdown();
    }
  };
  setTimeout(()=>{ document.addEventListener('mousedown', dropdownOutsideHandler); }, 0);
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function localDateISO(offsetDays=0){
  const d = new Date();
  d.setDate(d.getDate()+offsetDays);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}
function fmtDate(iso){
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function fmtMoney(n){

// ---------- STORAGE ----------
// Detecta se está rodando dentro do Claude (com armazenamento na nuvem) ou
// como arquivo local/hospedado fora do Claude (usa o armazenamento do navegador).
const hasClaudeStorage = (typeof window.storage !== 'undefined') && typeof window.storage.set === 'function';
let storageMode = hasClaudeStorage ? 'claude' : 'local';
let localStorageBlocked = false;
let deletePassword = null;

}

}

async function loadAll(){
  try{
    const [c,p,o,f,cp] = await Promise.all([
      safeGet('ceasa_clients'), safeGet('ceasa_products'), safeGet('ceasa_orders'),
      safeGet('ceasa_fornecedores'), safeGet('ceasa_compras')
    ]);
    clients = c || [];
    products = p || [];
    orders = o || [];
    fornecedores = f || [];
    compras = cp || [];
    migrateOrdersIfNeeded();
    migrateComprasIfNeeded();
  }catch(e){
    console.error('Erro ao carregar dados', e);
    clients = []; products = []; orders = []; fornecedores = []; compras = [];
  }
  dataReady = true;
  updateSyncStatus();
}
function migrateComprasIfNeeded(){
  let changed = false;
  compras.forEach(cp=>{
    if(typeof cp.statusPagamento !== 'string'){ cp.statusPagamento = 'pendente'; changed = true; }
    if(typeof cp.formaPagamento !== 'string'){ cp.formaPagamento = ''; changed = true; }
  });
  if(changed) saveCompras();
}
function migrateOrdersIfNeeded(){
  let changed = false;
  orders.forEach(o=>{
    if(typeof o.entregue !== 'boolean'){
      o.entregue = (o.status==='pago' || o.status==='entregue');
      changed = true;
    }
    if(typeof o.statusPagamento !== 'string'){
      if(typeof o.pago === 'boolean') o.statusPagamento = o.pago ? 'pago' : 'pendente';
      else if(o.status==='pago') o.statusPagamento = 'pago';
      else o.statusPagamento = 'pendente';
      changed = true;
    }
    if('pago' in o){ delete o.pago; changed = true; }
    if('status' in o){ delete o.status; changed = true; }
    if(typeof o.formaPagamento !== 'string'){
      o.formaPagamento = '';
      changed = true;
    }
    (o.itens||[]).forEach(it=>{
      if(typeof it.separado !== 'boolean'){ it.separado = false; changed = true; }
    });
  });
  if(changed) saveOrders();
}

async function safeGet(key){
  if(storageMode==='claude'){
    try{
      const res = await window.storage.get(key, false);
      return res ? JSON.parse(res.value) : null;
    }catch(e){
      return null;
    }
  }else{
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    }catch(e){
      console.error('Erro ao ler do navegador', e);
      return null;
    }
  }
}

// ---------- SINCRONIZAÇÃO ENTRE APARELHOS (nuvem via Firebase Realtime Database) ----------
let syncUrl = null;
let lastSyncedTimestamp = 0;
let syncing = false;
let cloudPushTimer = null;

function cleanSyncUrl(u){
  return String(u||'').trim().replace(/\/+$/,'');
}
async function loadSyncConfig(){
  try{ syncUrl = await safeGet('ceasa_sync_url'); }catch(e){ syncUrl = null; }
  try{ lastSyncedTimestamp = (await safeGet('ceasa_sync_ts')) || 0; }catch(e){ lastSyncedTimestamp = 0; }
}
async function saveSyncUrlConfig(url){
  syncUrl = url || null;
  await safeSet('ceasa_sync_url', syncUrl);
}
async function saveSyncTimestamp(ts){
  lastSyncedTimestamp = ts;
  await safeSet('ceasa_sync_ts', ts);
}
function updateSyncCloudStatusUI(){
  const el = document.getElementById('sync-cloud-status');
  if(!el) return;
  if(!syncUrl){ el.style.display = 'none'; return; }
  el.style.display = 'block';
  if(syncing){
    el.textContent = 'Sincronizando com a nuvem...';
  }else if(lastSyncedTimestamp){
    const d = new Date(lastSyncedTimestamp);
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    el.textContent = `Sincronizado às ${hh}:${mm}`;
  }else{
    el.textContent = 'Sincronização configurada';
  }
}
function scheduleCloudPush(){
  if(!syncUrl) return;
  clearTimeout(cloudPushTimer);
  cloudPushTimer = setTimeout(()=>{ pushToCloud(); }, 1500);
}
async function pushToCloud(){
  if(!syncUrl) return false;
  syncing = true; updateSyncCloudStatusUI();
  let ok = false;
  try{
    const ts = Date.now();
    const payload = { clients, products, orders, fornecedores, compras, updatedAt: ts };
    const res = await fetch(cleanSyncUrl(syncUrl) + '/data.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      cache: 'no-store'
    });
    if(res.ok){
      await saveSyncTimestamp(ts);
      ok = true;
    }
  }catch(e){
    console.error('Falha ao enviar dados para a nuvem', e);
  }
  syncing = false; updateSyncCloudStatusUI();
  return ok;
}
async function pullFromCloud(force){
  if(!syncUrl) return false;
  syncing = true; updateSyncCloudStatusUI();
  let applied = false;
  try{
    const cacheBust = (syncUrl.includes('?') ? '&' : '?') + '_ts=' + Date.now();
    const res = await fetch(cleanSyncUrl(syncUrl) + '/data.json' + cacheBust, { cache: 'no-store' });
    if(res.ok){
      const remote = await res.json();
      if(remote && typeof remote.updatedAt === 'number'){
        const remoteClients = remote.clients || [];
        const remoteProducts = remote.products || [];
        const remoteOrders = remote.orders || [];
        const remoteFornecedores = remote.fornecedores || [];
        const remoteCompras = remote.compras || [];
        const localSnapshot = JSON.stringify({clients, products, orders, fornecedores, compras});
        const remoteSnapshot = JSON.stringify({clients: remoteClients, products: remoteProducts, orders: remoteOrders, fornecedores: remoteFornecedores, compras: remoteCompras});
        const isDifferent = localSnapshot !== remoteSnapshot;
        if(force || isDifferent){
          clients = remoteClients;
          products = remoteProducts;
          orders = remoteOrders;
          fornecedores = remoteFornecedores;
          compras = remoteCompras;
          migrateOrdersIfNeeded();
          migrateComprasIfNeeded();
          await Promise.all([
            safeSet('ceasa_clients', clients), safeSet('ceasa_products', products), safeSet('ceasa_orders', orders),
            safeSet('ceasa_fornecedores', fornecedores), safeSet('ceasa_compras', compras)
          ]);
          await saveSyncTimestamp(remote.updatedAt);
          render();
          applied = true;
        }else{
          await saveSyncTimestamp(remote.updatedAt);
        }
      }
    }
  }catch(e){
    console.error('Falha ao buscar dados da nuvem', e);
  }
  syncing = false; updateSyncCloudStatusUI();
  return applied;
}
async function setupSyncUrl(url){
  const cleaned = cleanSyncUrl(url);
  if(!cleaned){ showToast('Cole a URL do banco de dados.'); return; }
  await saveSyncUrlConfig(cleaned);
  try{
    const res = await fetch(cleanSyncUrl(syncUrl) + '/data.json', { cache: 'no-store' });
    const remote = res.ok ? await res.json() : null;
    const remoteHasData = !!(remote && ((remote.clients&&remote.clients.length) || (remote.products&&remote.products.length) || (remote.orders&&remote.orders.length) || (remote.fornecedores&&remote.fornecedores.length) || (remote.compras&&remote.compras.length)));
    const localHasData = clients.length>0 || products.length>0 || orders.length>0 || fornecedores.length>0 || compras.length>0;
    if(remoteHasData && !localHasData){
      await pullFromCloud(true);
      showToast('Dados sincronizados da nuvem para este aparelho.');
    }else if(localHasData && !remoteHasData){
      await pushToCloud();
      showToast('Dados deste aparelho enviados para a nuvem.');
    }else if(remoteHasData && localHasData){
      const usarNuvem = confirm('Já existem dados neste aparelho E na nuvem.\n\nOK = usar os dados da nuvem (substitui os deste aparelho)\nCancelar = manter os dados deste aparelho (substitui os da nuvem)');
      if(usarNuvem){ await pullFromCloud(true); } else { await pushToCloud(); }
    }else{
      await saveSyncTimestamp(Date.now());
    }
    showToast('Sincronização entre aparelhos ativada!');
  }catch(e){
    console.error(e);
    showToast('Não consegui acessar essa URL agora. Confira se copiou certinho e tente sincronizar de novo.', 6000);
  }
  render();
}
async function disableSync(){
  syncUrl = null;
  await safeSet('ceasa_sync_url', null);
  render();
}
async function manualSyncNow(){
  if(!syncUrl) return;
  await pullFromCloud(true);
  await pushToCloud();
  showToast('Sincronizado!');
}

// ---------- SAVE QUEUE WITH BACKGROUND RETRY (modo Claude) ----------
const writeQueues = {};
const pendingKeys = new Set();
const keyGetters = {
  ceasa_clients: ()=>clients,
  ceasa_products: ()=>products,
  ceasa_orders: ()=>orders,
  ceasa_fornecedores: ()=>fornecedores,
  ceasa_compras: ()=>compras,
};

function safeSet(key, value){
  const prevTask = writeQueues[key] || Promise.resolve();
  const task = prevTask.then(()=>attemptSet(key, value));
  writeQueues[key] = task.catch(()=>{});
  return task;
}

async function attemptSet(key, value, retriesLeft=1, delay=800){
  // Modo local: grava direto no navegador, sem fila nem retry (é síncrono e confiável)
  if(storageMode==='local'){
    try{
      localStorage.setItem(key, JSON.stringify(value));
      localStorageBlocked = false;
      if(pendingKeys.has(key)){ pendingKeys.delete(key); }
      updateSyncStatus();
      return true;
    }catch(e){
      console.error('Erro ao salvar no navegador', key, e);
      localStorageBlocked = true;
      pendingKeys.add(key);
      updateSyncStatus();
      return null;
    }
  }
  // Modo Claude: tenta salvar na nuvem, com retry e fila em segundo plano
  try{
    const res = await window.storage.set(key, JSON.stringify(value), false);
    if(!res) throw new Error('Resposta vazia do armazenamento');
    if(pendingKeys.has(key)){ pendingKeys.delete(key); updateSyncStatus(); }
    return res;
  }catch(e){
    if(retriesLeft>0){
      await new Promise(r=>setTimeout(r, delay));
      return attemptSet(key, value, retriesLeft-1, delay*2);
    }
    console.error('Falha ao salvar', key, e);
    if(!pendingKeys.has(key)){
      pendingKeys.add(key);
      updateSyncStatus();
      showToast('Sem conexão no momento — vamos tentar salvar de novo automaticamente.');
    }
  }
}

function retryPendingSaves(){
  if(storageMode!=='claude') return;
  pendingKeys.forEach(key=>{
    const getter = keyGetters[key];
    if(getter) safeSet(key, getter());
  });
}
setInterval(retryPendingSaves, 8000);
window.addEventListener('online', retryPendingSaves);
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='hidden'){
    if(ordersSaveTimer){ clearTimeout(ordersSaveTimer); saveOrders(); }
    retryPendingSaves();
  }
});

function updateSyncStatus(){
  const el = document.getElementById('sync-status');
  if(!el) return;
  if(storageMode==='local'){
    if(localStorageBlocked){
      el.textContent = 'Não foi possível salvar neste navegador (armazenamento bloqueado ou cheio).';
      el.style.display = 'block';
    }else{
      el.style.display = 'none';
    }
    return;
  }
  if(pendingKeys.size>0){
    el.textContent = 'Alterações pendentes — tentando salvar novamente...';
    el.style.display = 'block';
  }else{
    el.style.display = 'none';
  }
}

// ---------- PIX (QR Code padrão Banco Central) ----------
const PIX_INFO = {
  telefone: '15996324556',
  nome: 'Felipe Tanaka',
  banco: 'Nubank',
  cidade: 'SAO M ARCANJO'
};
function pixCrc16(payload){
  let crc = 0xFFFF;
  for(let i=0;i<payload.length;i++){
    crc ^= (payload.charCodeAt(i) << 8);
    for(let j=0;j<8;j++){
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function pixField(id, value){
  const len = String(value.length).padStart(2,'0');
  return `${id}${len}${value}`;
}
function buildPixPayload(amount){
  const chavePix = '+55' + PIX_INFO.telefone.replace(/\D/g,'');
  const nome = PIX_INFO.nome.substring(0,25);
  const cidade = PIX_INFO.cidade.substring(0,15);
  const merchantAccount = pixField('00','br.gov.bcb.pix') + pixField('01', chavePix);
  let payload =
    pixField('00','01') +
    pixField('26', merchantAccount) +
    pixField('52','0000') +
    pixField('53','986') +
    (amount>0 ? pixField('54', amount.toFixed(2)) : '') +
    pixField('58','BR') +
    pixField('59', nome) +
    pixField('60', cidade) +
    pixField('62', pixField('05','***')) +
    '6304';
  return payload + pixCrc16(payload);
}
// ---------- IMPRESSÃO BLUETOOTH DIRETA (ESC/POS) — única via de impressão ----------
const BT_CANDIDATE_SERVICES = [
  '49535343-fe7d-4ae5-8fa9-9fafd205e455',
  '000018f0-0000-1000-8000-00805f9b34fb',
  '0000ff00-0000-1000-8000-00805f9b34fb',
  '0000ffe0-0000-1000-8000-00805f9b34fb',
];
let btDevice = null;
let btCharacteristic = null;
let btConnected = false;
let btConnecting = false;
let savedPrinterInfo = null; // {id, name} — persistido para reconectar sem reabrir o seletor

function bluetoothSupported(){
  return typeof navigator!=='undefined' && !!navigator.bluetooth;
}
async function savePrinterConfig(info){
  savedPrinterInfo = info;
  return safeSet('ceasa_printer', info);
}
async function loadPrinterConfig(){
  try{ return await safeGet('ceasa_printer'); }catch(e){ return null; }
}
async function findWritableCharacteristic(server){
  for(const svcUuid of BT_CANDIDATE_SERVICES){
    try{
      const service = await server.getPrimaryService(svcUuid);
      const chars = await service.getCharacteristics();
      const c = chars.find(ch=>ch.properties.writeWithoutResponse || ch.properties.write);
      if(c) return c;
    }catch(e){ /* serviço não presente neste dispositivo, tenta o próximo candidato */ }
  }
  return null;
}
async function connectToDevice(device){
  const server = await device.gatt.connect();
  const char = await findWritableCharacteristic(server);
  if(!char){
    try{ device.gatt.disconnect(); }catch(e){}
    throw new Error('no-writable-characteristic');
  }
  btDevice = device;
  btCharacteristic = char;
  btConnected = true;
  device.addEventListener('gattserverdisconnected', ()=>{
    btConnected = false; btCharacteristic = null;
    showToast('Impressora desconectada.');
    render();
  });
}
async function selectAndPairPrinter(){
  if(!bluetoothSupported()){
    showToast('Este navegador não suporta Bluetooth direto. Use o Chrome no Android.');
    return;
  }
  if(btConnecting) return;
  btConnecting = true; render();
  try{
    if(typeof navigator.bluetooth.getAvailability === 'function'){
      const available = await Promise.race([
        navigator.bluetooth.getAvailability(),
        new Promise(resolve=>setTimeout(()=>resolve(true), 2500))
      ]);
      if(!available){
        showToast('O Bluetooth do celular parece estar desligado. Ative o Bluetooth e tente de novo.');
        btConnecting = false; render(); return;
      }
    }
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: BT_CANDIDATE_SERVICES
    });
    showToast('Conectando à impressora...');
    await connectToDevice(device);
    await savePrinterConfig({ id: device.id, name: device.name || 'Impressora Bluetooth' });
    showToast('Impressora configurada: ' + (device.name || 'Impressora Bluetooth'));
  }catch(e){
    console.error(e);
    let msg;
    if(e && e.message==='no-writable-characteristic'){
      msg = 'Conectou, mas não encontrei um canal de impressão compatível nesse dispositivo.';
    }else if(e && e.name==='NotFoundError'){
      msg = 'A lista não achou nenhum dispositivo, ou foi cancelada. Verifique se a impressora está ligada e não conectada a outro celular.';
    }else if(e && (e.name==='SecurityError' || e.name==='NotAllowedError')){
      msg = 'O Chrome bloqueou o acesso ao Bluetooth. Nas configurações do Android, dê permissão de "Dispositivos próximos" (ou Localização) para o Chrome.';
    }else{
      msg = 'Não foi possível abrir a lista de dispositivos Bluetooth. Verifique se o Bluetooth do celular está ligado.';
    }
    showToast(msg, 6000);
  }
  btConnecting = false;
  render();
}
async function tryAutoReconnectPrinter(){
  if(!bluetoothSupported() || typeof navigator.bluetooth.getDevices !== 'function') return;
  savedPrinterInfo = await loadPrinterConfig();
  if(!savedPrinterInfo || !savedPrinterInfo.id) return;
  try{
    const devices = await navigator.bluetooth.getDevices();
    const match = devices.find(d=>d.id===savedPrinterInfo.id);
    if(match){
      await connectToDevice(match);
    }
  }catch(e){
    console.error('Reconexão automática da impressora falhou', e);
  }
  render();
}
async function reconnectPrinter(){
  if(!savedPrinterInfo){ selectAndPairPrinter(); return; }
  if(!bluetoothSupported() || typeof navigator.bluetooth.getDevices !== 'function'){
    showToast('Bluetooth direto não disponível neste navegador.');
    return;
  }
  btConnecting = true; render();
  try{
    const devices = await navigator.bluetooth.getDevices();
    const match = devices.find(d=>d.id===savedPrinterInfo.id);
    if(match){
      await connectToDevice(match);
      showToast('Impressora reconectada.');
    }else{
      showToast('Impressora salva não encontrada perto do celular. Selecione novamente.');
    }
  }catch(e){
    console.error(e);
    showToast('Não foi possível reconectar. Tente selecionar novamente.');
  }
  btConnecting = false;
  render();
}
function disconnectThermalPrinter(){
  try{ if(btDevice && btDevice.gatt && btDevice.gatt.connected) btDevice.gatt.disconnect(); }catch(e){}
  btConnected = false; btCharacteristic = null; btDevice = null;
  render();
}
async function forgetPrinter(){
  disconnectThermalPrinter();
  savedPrinterInfo = null;
  await safeSet('ceasa_printer', null);
  render();
}
async function sendBytesToPrinter(bytes){
  if(!btConnected || !btCharacteristic) throw new Error('printer-not-connected');
  const chunkSize = 20;
  for(let i=0;i<bytes.length;i+=chunkSize){
    const chunk = new Uint8Array(bytes.slice(i, i+chunkSize));
    if(btCharacteristic.properties.writeWithoutResponse){
      await btCharacteristic.writeValueWithoutResponse(chunk);
    }else{
      await btCharacteristic.writeValue(chunk);
    }
    await new Promise(r=>setTimeout(r, 15));
  }
}


// ---------- ESC/POS: montagem de comandos (cupom 58mm / 32 colunas) ----------
function strToBytes(s){
  const arr = [];
  for(let i=0;i<s.length;i++) arr.push(s.charCodeAt(i) & 0xFF);
  return arr;
}
function stripAccentsForPrint(s){
  return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\x00-\x7F]/g,'?');
}
function padLine(left, right, width=32){
  left = stripAccentsForPrint(left); right = stripAccentsForPrint(right);
  const space = width - left.length - right.length;
  if(space<1) return left.substring(0, Math.max(0,width-right.length-1)) + ' ' + right;
  return left + ' '.repeat(space) + right;
}
function escposInit(){ return [0x1B,0x40]; }
function escposAlign(n){ return [0x1B,0x61,n]; }
function escposBold(on){ return [0x1B,0x45,on?1:0]; }
function escposSize(w,h){ return [0x1D,0x21, ((w&0x0f)<<4)|(h&0x0f)]; }
function escposFeed(n){ return [0x1B,0x64,n]; }
function escposCut(){ return [0x1D,0x56,0x00]; }
function escposLine(text){ return strToBytes(stripAccentsForPrint(text)+'\n'); }
function escposQR(data, moduleSize, ec){
  moduleSize = moduleSize||5; ec = ec||49;
  let out = [];
  out = out.concat([0x1D,0x28,0x6B,0x04,0x00,0x31,0x41,0x32,0x00]);
  out = out.concat([0x1D,0x28,0x6B,0x03,0x00,0x31,0x43,moduleSize]);
  out = out.concat([0x1D,0x28,0x6B,0x03,0x00,0x31,0x45,ec]);
  const dataBytes = strToBytes(data);
  const len = dataBytes.length + 3;
  out = out.concat([0x1D,0x28,0x6B, len&0xFF, (len>>8)&0xFF, 0x31,0x50,0x30]);
  out = out.concat(dataBytes);
  out = out.concat([0x1D,0x28,0x6B,0x03,0x00,0x31,0x51,0x30]);
  return out;
}

function bindClienteForm(existing){
  document.getElementById('cancel-modal').addEventListener('click', closeModal);
  document.getElementById('cliente-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const data = {
      nome: document.getElementById('f-nome').value.trim(),
    };
    if(!data.nome) return;
    if(existing){
      Object.assign(existing, data);
    }else{
      clients.push({id: uid(), ...data});
    }
    await saveClients();
    showToast(existing?'Cliente atualizado.':'Cliente adicionado.');
    closeModal(); render();
  });
}

function bindPedidoForm(existing){
  const cancelBtn = document.getElementById('cancel-modal');
  if(cancelBtn) cancelBtn.addEventListener('click', closeModal);
  const form = document.getElementById('pedido-form');
  if(!form) return;

  const statusPagSel = document.getElementById('f-status-pagamento');
  if(statusPagSel) statusPagSel.addEventListener('change', ()=>{
    statusPagSel.classList.toggle('pago', statusPagSel.value==='pago');
    statusPagSel.classList.toggle('pendente', statusPagSel.value!=='pago');
  });

  function rebindItemRows(){
    document.querySelectorAll('[data-item-produto-btn]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const idx = btn.dataset.itemProdutoBtn;
        openProductDropdown(btn, orderDraftItems[idx].produtoId, (p)=>`${p.nome} (${fmtMoney(p.preco)}/${p.unidade})`, (selectedId)=>{
          orderDraftItems[idx].produtoId = selectedId;
          const p = products.find(pp=>pp.id===selectedId);
          orderDraftItems[idx].precoUnit = p ? p.preco : '';
          btn.textContent = p ? `${p.nome} (${fmtMoney(p.preco)}/${p.unidade})` : 'Produto...';
          btn.classList.toggle('placeholder', !p);
          const precoInput = document.querySelector(`[data-item-preco="${idx}"]`);
          if(precoInput) precoInput.value = p ? p.preco : '';
          recalcOrderTotal();
        });
      });
    });
    document.querySelectorAll('[data-item-qtd]').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        orderDraftItems[inp.dataset.itemQtd].qtd = inp.value;
        recalcOrderTotal();
      });
    });
    document.querySelectorAll('[data-item-preco]').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        orderDraftItems[inp.dataset.itemPreco].precoUnit = inp.value;
        recalcOrderTotal();
      });
    });
    document.querySelectorAll('[data-item-separado]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        orderDraftItems[cb.dataset.itemSeparado].separado = cb.checked;
      });
    });
    document.querySelectorAll('[data-remove-item]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        closeProductDropdown();
        const idx = Number(btn.dataset.removeItem);
        if(orderDraftItems.length<=1) return;
        orderDraftItems.splice(idx,1);
        document.getElementById('order-items-wrap').innerHTML = orderDraftItems.map((it,i)=>orderItemRowHTML(it,i)).join('');
        rebindItemRows();
        recalcOrderTotal();
      });
    });
  }
  rebindItemRows();
  recalcOrderTotal();

  document.getElementById('add-item-row').addEventListener('click', ()=>{
    closeProductDropdown();
    orderDraftItems.push({produtoId:'', qtd:1, separado:false, precoUnit:''});
    document.getElementById('order-items-wrap').innerHTML = orderDraftItems.map((it,i)=>orderItemRowHTML(it,i)).join('');
    rebindItemRows();
    recalcOrderTotal();
  });

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const clienteId = document.getElementById('f-cliente').value;
    const data = document.getElementById('f-data').value;
    const entregue = document.getElementById('f-entregue').checked;
    const statusPagamento = document.getElementById('f-status-pagamento').value;
    const formaPagamento = document.getElementById('f-forma-pagamento').value;
    if(!clienteId || !data) return;
    const itensValidos = orderDraftItems.filter(it=>it.produtoId && Number(it.qtd)>0).map(it=>{
      const p = products.find(pp=>pp.id===it.produtoId);
      const precoCustom = parseFloat(it.precoUnit);
      const precoFinal = (!isNaN(precoCustom) && precoCustom>=0) ? precoCustom : p.preco;
      return { produtoId: it.produtoId, produtoNome: p.nome, unidade: p.unidade, qtd: Number(it.qtd), precoUnit: precoFinal, separado: !!it.separado };
    });
    if(itensValidos.length===0){ showToast('Adicione ao menos um item válido.'); return; }

    if(existing){
      existing.clienteId = clienteId; existing.data = data; existing.entregue = entregue; existing.statusPagamento = statusPagamento; existing.formaPagamento = formaPagamento; existing.itens = itensValidos;
    }else{
      orders.push({ id: uid(), clienteId, data, entregue, statusPagamento, formaPagamento, itens: itensValidos, criadoEm: Date.now() });
    }
    await saveOrders();
    showToast(existing?'Pedido atualizado.':'Pedido criado.');
    closeModal(); render();
  });
}

function bindCompraForm(existing){
  const cancelBtn = document.getElementById('cancel-modal');
  if(cancelBtn) cancelBtn.addEventListener('click', closeModal);
  const form = document.getElementById('compra-form');
  if(!form) return;

  const statusPagSel = document.getElementById('f-status-pagamento-compra');
  if(statusPagSel) statusPagSel.addEventListener('change', ()=>{
    statusPagSel.classList.toggle('pago', statusPagSel.value==='pago');
    statusPagSel.classList.toggle('pendente', statusPagSel.value!=='pago');
  });

  function rebindCompraItemRows(){
    document.querySelectorAll('[data-compra-item-produto-btn]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const idx = btn.dataset.compraItemProdutoBtn;
        openProductDropdown(btn, compraDraftItems[idx].produtoId, (p)=>`${p.nome}${p.custo?' (custo '+fmtMoney(p.custo)+'/'+p.unidade+')':''}`, (selectedId)=>{
          compraDraftItems[idx].produtoId = selectedId;
          const p = products.find(pp=>pp.id===selectedId);
          compraDraftItems[idx].custoUnit = p ? (p.custo||0) : '';
          btn.textContent = p ? `${p.nome}${p.custo?' (custo '+fmtMoney(p.custo)+'/'+p.unidade+')':''}` : 'Produto...';
          btn.classList.toggle('placeholder', !p);
          const custoInput = document.querySelector(`[data-compra-item-custo="${idx}"]`);
          if(custoInput){
            custoInput.value = p ? (p.custo||0) : '';
            custoInput.classList.toggle('needs-review', compraItemPrecoPendente({custoUnit: custoInput.value}));
          }
          recalcCompraTotal();
        });
      });
    });
    document.querySelectorAll('[data-compra-item-qtd]').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        compraDraftItems[inp.dataset.compraItemQtd].qtd = inp.value;
        recalcCompraTotal();
      });
    });
    document.querySelectorAll('[data-compra-item-custo]').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        compraDraftItems[inp.dataset.compraItemCusto].custoUnit = inp.value;
        inp.classList.toggle('needs-review', compraItemPrecoPendente({custoUnit: inp.value}));
        recalcCompraTotal();
      });
    });
    document.querySelectorAll('[data-remove-compra-item]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        closeProductDropdown();
        const idx = Number(btn.dataset.removeCompraItem);
        if(compraDraftItems.length<=1) return;
        compraDraftItems.splice(idx,1);
        document.getElementById('compra-items-wrap').innerHTML = compraDraftItems.map((it,i)=>compraItemRowHTML(it,i)).join('');
        rebindCompraItemRows();
        recalcCompraTotal();
      });
    });
  }
  rebindCompraItemRows();
  recalcCompraTotal();

  document.getElementById('add-compra-item-row').addEventListener('click', ()=>{
    closeProductDropdown();
    compraDraftItems.push({produtoId:'', qtd:1, custoUnit:''});
    document.getElementById('compra-items-wrap').innerHTML = compraDraftItems.map((it,i)=>compraItemRowHTML(it,i)).join('');
    rebindCompraItemRows();
    recalcCompraTotal();
  });

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fornecedorId = document.getElementById('f-fornecedor').value;
    const data = document.getElementById('f-data').value;
    const statusPagamento = document.getElementById('f-status-pagamento-compra').value;
    const formaPagamento = document.getElementById('f-forma-pagamento-compra').value;
    if(!fornecedorId || !data) return;
    const itensValidos = compraDraftItems.filter(it=>it.produtoId && Number(it.qtd)>0).map(it=>{
      const p = products.find(pp=>pp.id===it.produtoId);
      const custoCustom = parseFloat(it.custoUnit);
      const custoFinal = (!isNaN(custoCustom) && custoCustom>=0) ? custoCustom : (p.custo||0);
      return { produtoId: it.produtoId, produtoNome: p.nome, unidade: p.unidade, qtd: Number(it.qtd), custoUnit: custoFinal };
    });
    if(itensValidos.length===0){ showToast('Adicione ao menos um item válido.'); return; }

    if(existing){
      existing.fornecedorId = fornecedorId; existing.data = data; existing.statusPagamento = statusPagamento; existing.formaPagamento = formaPagamento; existing.itens = itensValidos;
    }else{
      compras.push({ id: uid(), fornecedorId, data, statusPagamento, formaPagamento, itens: itensValidos, criadoEm: Date.now() });
    }
    await saveCompras();
    showToast(existing?'Compra atualizada.':'Compra registrada.');
    closeModal(); render();
  });
}

// ---------- RESET ----------
async function performFullReset(){
  if(confirm('Isso vai apagar todos os clientes, produtos, pedidos, fornecedores e compras salvos. Continuar?')){
    clients = []; products = []; orders = []; fornecedores = []; compras = [];
    await Promise.all([saveClients(), saveProducts(), saveOrders(), saveFornecedores(), saveCompras()]);
    showToast('Todos os dados foram apagados.');
    render();
  }
}
function deletePasswordPromptModalHTML(){
  return `
    <h3>Digite a senha</h3>
    <p style="font-size:12.5px;color:var(--wood-light);margin-bottom:12px;">
      Essa ação vai apagar todos os dados. Digite a senha pra confirmar.
    </p>
    <div class="field"><input type="password" id="delete-password-input" placeholder="Senha"></div>
    <div class="modal-actions">
      <button type="button" class="btn ghost" id="cancel-modal">Cancelar</button>
      <button type="button" class="btn primary" id="confirm-delete-password-btn">Confirmar</button>
    </div>
  `;
}
document.getElementById('reset-btn').addEventListener('click', async ()=>{
  if(deletePassword){
    openModal(deletePasswordPromptModalHTML());
    document.getElementById('cancel-modal').addEventListener('click', closeModal);
    const input = document.getElementById('delete-password-input');
    const tryConfirm = async ()=>{
      if(input.value !== deletePassword){
        showToast('Senha incorreta.');
        return;
      }
      closeModal();
      await performFullReset();
    };
    document.getElementById('confirm-delete-password-btn').addEventListener('click', tryConfirm);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryConfirm(); });
  }else{
    await performFullReset();
  }
});

// ---------- SENHA DE PROTEÇÃO DO RESET ----------

  return `
    <h3>Proteger "apagar dados" com senha</h3>
    <p style="font-size:12.5px;color:var(--wood-light);line-height:1.5;margin-bottom:12px;">
      ${deletePassword ? 'Já existe uma senha configurada. Digite uma nova pra trocar, ou deixe em branco pra remover a proteção.' : 'Defina uma senha que será pedida sempre que alguém tentar apagar todos os dados.'}
    </p>
    <div class="field"><label>${deletePassword ? 'Nova senha' : 'Senha'}</label><input type="password" id="new-delete-password" placeholder="${deletePassword ? 'Deixe em branco para remover' : 'Digite uma senha'}"></div>
    <div class="modal-actions">
      <button type="button" class="btn ghost" id="cancel-modal">Cancelar</button>
      <button type="button" class="btn primary" id="save-delete-password-btn">Salvar</button>
    </div>
  `;
}
document.getElementById('set-delete-password-btn').addEventListener('click', ()=>{
  openModal(deletePasswordSetupModalHTML());
  document.getElementById('cancel-modal').addEventListener('click', closeModal);
  document.getElementById('save-delete-password-btn').addEventListener('click', async ()=>{
    const val = document.getElementById('new-delete-password').value.trim();
    await saveDeletePassword(val);
    showToast(val ? 'Senha definida para apagar dados.' : 'Proteção por senha removida.');
    closeModal();

});

// ---------- SINCRONIZAÇÃO ENTRE APARELHOS: modal ----------
function syncConfigModalHTML(){
  return `
    <h3>Sincronizar entre aparelhos</h3>
    <p style="font-size:12.5px;color:var(--wood-light);line-height:1.5;margin-bottom:12px;">
      Cole aqui a URL do banco de dados (Firebase Realtime Database) — a mesma URL deve ser colada em todos os aparelhos que você quer manter sincronizados (celular, notebook, etc.).
    </p>
    <div class="field">
      <label>URL do banco de dados</label>
      <input type="text" id="sync-url-input" placeholder="https://seu-projeto-default-rtdb.firebaseio.com" value="${escapeAttr(syncUrl||'')}">
    </div>
    <div style="font-size:12px;color:var(--wood-light);margin-bottom:10px;">
      ${syncUrl ? '🟢 Sincronização ativa.' : '⚪ Sincronização desativada.'}
    </div>
    <div class="modal-actions">
      <button type="button" class="btn ghost" id="cancel-modal">Fechar</button>
      ${syncUrl ? `<button type="button" class="btn ghost" id="sync-now-btn">Sincronizar agora</button>` : ''}
      <button type="button" class="btn primary" id="sync-save-btn">Salvar</button>
    </div>
    ${syncUrl ? `<button type="button" class="link-btn" id="sync-disable-btn" style="margin-top:12px;">Desativar sincronização</button>` : ''}
  `;
}
document.getElementById('sync-config-btn').addEventListener('click', ()=>{
  openModal(syncConfigModalHTML());
  document.getElementById('cancel-modal').addEventListener('click', closeModal);
  const saveBtn = document.getElementById('sync-save-btn');
  if(saveBtn) saveBtn.addEventListener('click', async ()=>{
    const val = document.getElementById('sync-url-input').value;
    await setupSyncUrl(val);
    closeModal();
  });
  const nowBtn = document.getElementById('sync-now-btn');
  if(nowBtn) nowBtn.addEventListener('click', async ()=>{
    await manualSyncNow();
  });
  const disableBtn = document.getElementById('sync-disable-btn');
  if(disableBtn) disableBtn.addEventListener('click', async ()=>{
    await disableSync();
    closeModal();
    showToast('Sincronização desativada.');
  });
});

// ---------- EXPORTAR ----------
document.getElementById('export-btn').addEventListener('click', ()=>{
  try{
    const payload = {
      app: 'tnk-p268',
      exportadoEm: new Date().toISOString(),
      clients, products, orders, fornecedores, compras
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tnk-p268-backup-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('Backup exportado.');
  }catch(err){
    console.error(err);
    showToast('Não foi possível exportar os dados.');
  }
});

// ---------- IMPORTAR ----------
document.getElementById('import-input').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (evt)=>{
    try{
      const parsed = JSON.parse(evt.target.result);
      if(!Array.isArray(parsed.clients) || !Array.isArray(parsed.products) || !Array.isArray(parsed.orders)){
        showToast('Arquivo inválido. Escolha um backup exportado deste CRM.');
        return;
      }
      const parsedFornecedores = Array.isArray(parsed.fornecedores) ? parsed.fornecedores : [];
      const parsedCompras = Array.isArray(parsed.compras) ? parsed.compras : [];
      const substituir = confirm(
        `Este arquivo tem ${parsed.clients.length} cliente(s), ${parsed.products.length} produto(s), ${parsed.orders.length} pedido(s), ${parsedFornecedores.length} fornecedor(es) e ${parsedCompras.length} compra(s).\n\nOK = substituir todos os dados atuais\nCancelar = juntar com os dados atuais (sem duplicar)`
      );
      if(substituir){
        clients = parsed.clients;
        products = parsed.products;
        orders = parsed.orders;
        fornecedores = parsedFornecedores;
        compras = parsedCompras;
      }else{
        const existingClientIds = new Set(clients.map(c=>c.id));
        const existingProductIds = new Set(products.map(p=>p.id));
        const existingOrderIds = new Set(orders.map(o=>o.id));
        const existingFornecedorIds = new Set(fornecedores.map(f=>f.id));
        const existingCompraIds = new Set(compras.map(c=>c.id));
        clients = clients.concat(parsed.clients.filter(c=>!existingClientIds.has(c.id)));
        products = products.concat(parsed.products.filter(p=>!existingProductIds.has(p.id)));
        orders = orders.concat(parsed.orders.filter(o=>!existingOrderIds.has(o.id)));
        fornecedores = fornecedores.concat(parsedFornecedores.filter(f=>!existingFornecedorIds.has(f.id)));
        compras = compras.concat(parsedCompras.filter(c=>!existingCompraIds.has(c.id)));
      }
      migrateOrdersIfNeeded();
      migrateComprasIfNeeded();
      await Promise.all([saveClients(), saveProducts(), saveOrders(), saveFornecedores(), saveCompras()]);
      showToast('Dados importados com sucesso.');
      render();
    }catch(err){
      console.error(err);
      showToast('Não foi possível ler esse arquivo.');
    }finally{
      e.target.value = '';
    }
  };
  reader.readAsText(file);
});

// ---------- INIT ----------
function setTodayLabel(){
  const d = new Date();
  const dias = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const diaSemana = dias[d.getDay()];
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  document.getElementById('today-label').textContent = `${diaSemana} ${dd}/${mm}/${yyyy}`;
}
function setStorageModeNote(){
  const el = document.getElementById('storage-mode-note');
  if(!el) return;
  el.textContent = storageMode==='claude'
    ? 'Dados salvos na sua conta do Claude'
    : 'Dados salvos neste navegador/dispositivo — exporte backups regularmente';
}
(async function init(){
  setTodayLabel();
  setStorageModeNote();
  render();
  await loadAll();
  await loadDeletePassword();
  render();
  tryAutoReconnectPrinter();

  await loadSyncConfig();
  if(syncUrl){
    await pullFromCloud(false);
  }
  updateSyncCloudStatusUI();

  setInterval(()=>{
    if(syncUrl && document.visibilityState==='visible' && !syncing){
      pullFromCloud(false);
    }
  }, 12000);
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState==='visible' && syncUrl && !syncing){
      pullFromCloud(false);
    }
  });
})();
</script>
